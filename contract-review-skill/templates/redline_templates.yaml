# redline_templates.yaml
defaults:
  platform_name: "1688"
  tax_rate: "6%"

templates:
  data_ownership:
    mild: |
      建议文本（mild）：
      “{platform_name}后台的用户、交易及归因数据归{platform_name}所有；服务商在本次合作中独立采集的推广资料（如线下采集表、联系方式、群成员名单等）归服务商所有。服务商应授予{platform_name}为结算、合规及反作弊所必需的非排他使用权。”
    balanced: |
      建议文本（balanced）：
      “{platform_name}后台的用户、交易及归因数据归{platform_name}所有；服务商在合作期间独立采集的推广资料归服务商所有。服务商同意授予{platform_name}为结算、核验与反作弊所必要的免费、不可撤销的非排他使用权，但不得将该等服务商独立采集的数据用于本协议以外的商业目的，除非经服务商书面同意或法律另有规定。”
    strong: |
      建议文本（strong）：
      “在本协议项下因合作产生、收集或留存的全部与合作相关之数据（包括但不限于用户信息、交易数据、推广数据）均归{platform_name}所有。服务商应将前述数据无偿转让给{platform_name}并配合数据交付。”

  confidentiality:
    mild: |
      建议文本（mild）：
      “双方应对因本协议签订与履行过程中获悉的对方标识为‘保密’的非公开信息承担保密义务。保密期限为合作期间及终止后两年。法律要求披露或信息已公开的情形不在保密范围内。”
    balanced: |
      建议文本（balanced）：
      “双方对本协议及履行过程中获悉的非公开商业/技术信息承担保密义务，合作期及终止后两年内不得向第三方披露，法律要求或经对方书面同意的除外。”
    strong: |
      建议文本（strong）：
      “双方对在本协议履行中获取的全部信息承担永久保密义务，未经另一方书面同意不得对外披露。”

  ip_assignment:
    mild: |
      建议文本（mild）：
      “服务商保留其背景知识产权。服务商为本协议专门创作并交付的成果，双方可另行约定权利归属；若无另约，服务商应向{platform_name}授予非独家使用权用于本平台运营。”
    balanced: |
      建议文本（balanced）：
      “服务商保留其背景IP；对为本协议专门创作的交付物，服务商同意向{platform_name}授予全球、永久、非排他、可再许可的使用权，用于平台展示、运营与结算目的。双方另行约定的独占或转让须另行书面约定并对价。”
    strong: |
      建议文本（strong）：
      “服务商在本协议项下创作的所有成果，其全部知识产权无偿转让给{platform_name}。”

  attribution:
    mild: |
      建议文本（mild）：
      “归因以用户注册或绑定时平台记录的匹配信息为准（包括渠道码/搜索词及时间戳）。如出现多个匹配记录，双方应友好协商并以平台最终记录为准。”
    balanced: |
      建议文本（balanced）：
      “专属搜索词/渠道码为归因依据。归因以用户注册/绑定时平台记录的渠道码与时间戳为准；若用户匹配多个渠道码，则以最早时间戳记录归属；平台应向服务商提供脱敏对账清单供核对。”
    strong: |
      建议文本（strong）：
      “专属渠道码为唯一归因凭证；平台记录为最终且唯一依据，平台有权在系统日志中认定归因且无需向服务商提供补充证据。”

  cpa_cps_logic:
    mild: |
      建议文本（mild）：
      “CPA 与 CPS 可并行结算。CPA 按用户动作独立结算；CPS 按月度阶梯发放。若同一用户同时满足 CPA 与 CPS，双方以并行支付为原则。”
    balanced: |
      建议文本（balanced）：
      “CPA 与 CPS 并行结算：CPA 按动作支付，CPS 按自然月累计有效成交金额阶梯激励；同一用户当月的 CPA 与 CPS 可同时计付，但 C PS 封顶与 ‘6 个连续月最多 3 次’ 的规则以平台用户ID口径累计计算。”
    strong: |
      建议文本（strong）：
      “平台将优先支付CPS激励，若CPA已支付，平台有权在CPS结算时对已支付的CPA做部分抵扣，具体抵扣规则由平台决定。”

  termination_settlement:
    mild: |
      建议文本（mild）：
      “本协议终止时，双方应按既有结算规则完成截至终止日的结算。平台在终止前通过邮件确认无待结算金额后方可正式终止。”
    balanced: |
      建议文本（balanced）：
      “本协议终止不影响至终止日已产生的结算义务；平台于终止前通过书面（含邮件）确认或结清待结算金额后方可终止，未结算款项按本协议规则继续处理直至结清。”
    strong: |
      建议文本（strong）：
      “平台有权随时终止本协议，并依据后台数据对已发生交易进行结算和追回，终止后平台不承担因终止产生的额外支付义务。”

  freeze_deduction:
    mild: |
      建议文本（mild）：
      “若平台怀疑存在异常交易，平台可暂时冻结相关结算款项并在合理期限内完成核查，核查期间应通知服务商。”
    balanced: |
      建议文本（balanced）：
      “若平台基于系统规则认定异常交易，平台可暂时冻结相关结算款项并在合理期限内完成调查，向服务商通报理由并允许服务商提供证据；如最终认定为异常，平台可追回对应款项。”
    strong: |
      建议文本（strong）：
      “平台有权在识别到异常或舞弊情形时直接扣减或追回相应款项，且平台对异常交易的认定为最终决定，服务商不得因此对平台主张赔偿。”

  evidence_provision:
    mild: |
      建议文本（mild）：
      “平台应向服务商提供对账清单（可脱敏），供服务商核对结算数据。服务商应在规定期限内提出异议。”
    balanced: |
      建议文本（balanced）：
      “平台在每结算周期后应向服务商提供脱敏对账清单（包含必要字段），服务商在收到后5个工作日内确认或提出异议；平台应保留原始日志以备审计。”
    strong: |
      建议文本（strong）：
      “平台为结算唯一数据源，平台可选择不向服务商提供任何原始日志；平台结算数据为最终依据。”
